name: Update README Stats

on:
  schedule:
    - cron: '0 9 1,15 * *'  # 1st and 15th of each month at 09:00 UTC (bi-weekly)
  workflow_dispatch:          # manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run stats update
        run: python .github/scripts/update_stats.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" && exit 0
          git add README.md
          git commit -m "chore: auto-update README stats [skip ci]"
          git push
